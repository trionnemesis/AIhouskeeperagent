apiVersion: apps/v1
kind: Deployment
metadata:
  name: domain-mcp
  namespace: tenant-demo
  labels:
    app.kubernetes.io/name: domain-mcp
    app.kubernetes.io/part-of: hermes-real-estate
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: domain-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: domain-mcp
        app.kubernetes.io/part-of: hermes-real-estate
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        # Node domain MCP server covering C4-C9 (C5 customer-crm = sole mem0 path, gated).
        - name: domain-mcp
          image: REGION-docker.pkg.dev/PROJECT/hermes/domain-mcp:v0.1.0
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TENANT_ID
              value: "tenant-demo"
            - name: MULTITENANCY_MODE
              value: "deployment"
            - name: MEM0_ENABLED
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hermes-runtime
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: hermes-runtime
                  key: REDIS_URL
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
