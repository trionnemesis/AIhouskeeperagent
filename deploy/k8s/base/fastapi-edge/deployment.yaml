apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-edge
  namespace: tenant-demo
  labels:
    app.kubernetes.io/name: fastapi-edge
    app.kubernetes.io/part-of: hermes-real-estate
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fastapi-edge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fastapi-edge
        app.kubernetes.io/part-of: hermes-real-estate
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fastapi-edge
          image: REGION-docker.pkg.dev/PROJECT/hermes/fastapi-edge:v0.1.0
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TENANT_ID
              value: "tenant-demo"
            - name: MULTITENANCY_MODE
              value: "deployment"
            - name: LINE_CHANNEL_SECRET
              valueFrom:
                secretKeyRef:
                  name: line-channel
                  key: LINE_CHANNEL_SECRET
            - name: LINE_CHANNEL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: line-channel
                  key: LINE_CHANNEL_ACCESS_TOKEN
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: hermes-runtime
                  key: REDIS_URL
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
