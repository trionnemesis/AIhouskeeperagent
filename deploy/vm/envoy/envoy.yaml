# Envoy egress forward-proxy（:3128）— app 對外的唯一出口（DI-4）。
# MVP：dynamic_forward_proxy + CONNECT 隧道；591/leju 網域直接 403（黑名單）。
# proxy-wasm 5 filter（Policy/PII/Router/ToolAuthZ/RAG）為後續落地佔位（見 gateway-compliance.md）。
admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
  listeners:
    - name: egress
      address:
        socket_address: { address: 0.0.0.0, port_value: 3128 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: egress
                http2_protocol_options: { allow_connect: true }
                upgrade_configs:
                  - upgrade_type: CONNECT
                route_config:
                  name: egress_routes
                  virtual_hosts:
                    - name: deny_blacklist # DI-4：591/leju 黑名單（含 CONNECT 的 :443/:80 authority）
                      domains:
                        - "591.com.tw"
                        - "*.591.com.tw"
                        - "591.com.tw:443"
                        - "*.591.com.tw:443"
                        - "591.com.tw:80"
                        - "*.591.com.tw:80"
                        - "leju.com.tw"
                        - "*.leju.com.tw"
                        - "leju.com.tw:443"
                        - "*.leju.com.tw:443"
                        - "leju.com.tw:80"
                        - "*.leju.com.tw:80"
                      routes:
                        - match: { connect_matcher: {} }
                          direct_response: { status: 403 }
                        - match: { prefix: "/" }
                          direct_response: { status: 403 }
                    - name: allow_all # 其餘（gov 等）經動態轉發
                      domains: ["*"]
                      routes:
                        - match: { connect_matcher: {} }
                          route:
                            cluster: dynamic_forward_proxy
                            upgrade_configs:
                              - upgrade_type: CONNECT
                                connect_config: {}
                        - match: { prefix: "/" }
                          route: { cluster: dynamic_forward_proxy }
                http_filters:
                  - name: envoy.filters.http.dynamic_forward_proxy
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.FilterConfig
                      dns_cache_config: { name: dns_cache, dns_lookup_family: V4_ONLY }
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: dynamic_forward_proxy
      lb_policy: CLUSTER_PROVIDED
      cluster_type:
        name: envoy.clusters.dynamic_forward_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
          dns_cache_config: { name: dns_cache, dns_lookup_family: V4_ONLY }
